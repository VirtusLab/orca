version = 3.8.3
runner.dialect = scala3

# scalafmt 3.8.3's scala3 dialect parser cannot tokenize capture-checking
# syntax (the `C^` capture-set type parameter and `->{C}` capture arrows in
# CheckedPar.scala), failing before any `// format: off` region is consulted.
# Exclude that one file until scalafmt gains capture-checking support; it is
# hand-formatted to match the surrounding style.
project.excludeFilters = ["tools/src/main/scala/orca/CheckedPar.scala"]
